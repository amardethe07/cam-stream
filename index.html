<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CamStream — Secure Live Camera</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#07080f;color:#dde0f0;font-family:'Space Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:32px;}
  .logo{font-family:'Syne',sans-serif;font-size:clamp(36px,10vw,72px);font-weight:900;letter-spacing:-4px;line-height:1;}
  .logo span{color:#00e5ff}
  .sub{font-size:10px;color:#44475a;letter-spacing:4px;text-align:center;margin-top:8px}
  .cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%;max-width:560px}
  .card{flex:1;min-width:200px;background:#0f101a;border:1px solid #1a1b2e;border-radius:20px;padding:28px 20px;text-align:center;text-decoration:none;color:inherit;transition:all 0.3s;display:flex;flex-direction:column;gap:10px;align-items:center;}
  .card:hover{transform:translateY(-4px)}
  .card.s:hover{border-color:#00ff88;box-shadow:0 20px 40px rgba(0,255,136,0.1)}
  .card.v:hover{border-color:#00e5ff;box-shadow:0 20px 40px rgba(0,229,255,0.1)}
  .icon{font-size:32px}
  .card-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-1px}
  .card-desc{font-size:10px;color:#44475a;letter-spacing:1px;line-height:1.8}
  .lock-badge{font-size:9px;padding:3px 10px;border-radius:20px;letter-spacing:2px;margin-top:2px}
  .card.s .lock-badge{border:1px solid rgba(0,255,136,0.3);color:#00ff88}
  .card.v .lock-badge{border:1px solid rgba(0,229,255,0.3);color:#00e5ff}
  .status-row{font-size:10px;color:#44475a;letter-spacing:2px;padding:8px 18px;border:1px solid #1a1b2e;border-radius:30px;}
  .status-row span{color:#00e5ff}
</style>
</head>
<body>
  <div>
    <div class="logo">Cam<span>Stream</span></div>
    <div class="sub">🔒 PIN PROTECTED · LIVE · REALTIME</div>
  </div>
  <div class="cards">
    <a href="/streamer.html" class="card s">
      <div class="icon">📱</div>
      <div class="card-title">STREAMER</div>
      <div class="card-desc">YOUR PHONE<br/>SHARE CAMERA</div>
      <div class="lock-badge">🔑 PIN REQUIRED</div>
    </a>
    <a href="/viewer.html" class="card v">
      <div class="icon">👁</div>
      <div class="card-title">VIEWER</div>
      <div class="card-desc">ANYWHERE<br/>WATCH LIVE</div>
      <div class="lock-badge">🔑 PIN + NAME</div>
    </a>
  </div>
  <div class="status-row">SERVER: <span id="s">CHECKING...</span></div>
  <script>
    fetch('/status').then(r=>r.json()).then(d=>{
      document.getElementById('s').textContent=`STREAMER ${d.streamer.toUpperCase()} · ${d.viewerCount} VIEWERS`;
    }).catch(()=>document.getElementById('s').textContent='UNKNOWN');
  </script>
</body>
</html>
